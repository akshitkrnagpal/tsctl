name: Release

# Manual-only. Trigger from the Actions tab → "Release" → Run workflow.
# Order of operations:
#   1. `bun run version-package` — if there are pending .changeset/*.md
#      files, consume them: bump package.json version, write CHANGELOG.md
#      entries, delete the .md. No-op if no pending changesets. All in
#      the runner's working tree only; nothing pushed yet.
#   2. `bunx changeset publish` — push any package.json version that
#      isn't yet on npm. Uses the OIDC trusted-publishing flow (no
#      NPM_TOKEN needed). No-op if everything is already on npm.
#   3. If publish succeeded AND the working tree changed (i.e., step 1
#      produced a version bump): commit it as github-actions[bot] and
#      push to main.
#
# Failure semantics: if publish fails, no commit hits main. The pending
# changesets stay on main intact, and the next run will re-attempt.
# `changeset publish` skips versions already on npm, so partial-failure
# recovery is automatic.
#
# Setup (one-time, on npmjs.com):
# - @tsctl/cli → Package Settings → Trusted Publisher → Add publisher →
#   GitHub Actions → owner: akshitkrnagpal · repository: tsctl ·
#   workflow filename: release.yml · environment: (blank).
#
# Requires Node 24+ on the runner (ships npm 11+, which speaks OIDC).

on:
  workflow_dispatch:

permissions:
  contents: write  # for pushing the post-publish version-bump commit
  id-token: write  # npm trusted-publishing OIDC token request

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Install bun
        uses: oven-sh/setup-bun@v2

      - name: Install Node
        uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Apply pending changesets
        id: version
        run: |
          bun run version-package
          if git diff --quiet; then
            echo "No pending changesets — version unchanged."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "Version bumped from pending changesets."
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to npm
        # `changeset publish` reads package.json, skips versions already
        # on npm, publishes the rest. Idempotent. prepublishOnly in
        # package.json runs `bun run build:npm` before npm publish.
        # No NPM_TOKEN — npm picks up the OIDC token from
        # ACTIONS_ID_TOKEN_REQUEST_TOKEN (granted via id-token: write).
        run: bunx changeset publish

      - name: Commit + push version bumps
        if: steps.version.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "chore: release"
          git push origin HEAD:main
