name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - run: bun run typecheck

  test-v27:
    name: Tests (Typesense v27)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Start Typesense v27
        run: docker compose up -d
      - name: Wait for Typesense
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8108/health && break
            echo "Waiting for Typesense... ($i)"
            sleep 2
          done
      - run: bun test
      - name: Stop Typesense
        if: always()
        run: docker compose down -v

  test-v30:
    name: Tests (Typesense v30)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install
      - name: Start Typesense v30
        run: docker compose -f docker-compose.v30.yml up -d
      - name: Wait for Typesense
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:8108/health && break
            echo "Waiting for Typesense... ($i)"
            sleep 2
          done
      - run: bun test
      - name: Stop Typesense
        if: always()
        run: docker compose -f docker-compose.v30.yml down -v
